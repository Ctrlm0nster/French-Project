<!DOCTYPE html>
<html class="dark" lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cinémathèque | Fiche Technique</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,400;0,700;1,400&family=Manrope:wght@300;400;600&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script src="assets/js/site-common.js"></script>
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            primary: "#abc7fe",
            secondary: "#ffb3af",
            "on-surface": "#e2e2e5",
            "on-surface-variant": "#c4c6d0",
            background: "#121416",
            "surface-container": "#1e2022",
            "surface-container-high": "#282a2c",
            "outline-variant": "#43474f",
            "on-primary": "#0e305e",
          },
          fontFamily: { headline: ["Noto Serif"], body: ["Manrope"] },
        },
      },
    };
  </script>
  <style>
    body { font-family: Manrope, sans-serif; background: #121416; color: #e2e2e5; }
    .font-serif { font-family: "Noto Serif", serif; }
  </style>
</head>
<body class="min-h-screen">
  <!-- TopNavBar -->
  <nav class="fixed top-0 w-full z-50 bg-slate-950/70 backdrop-blur-xl shadow-2xl shadow-black/50">
    <div class="flex justify-between items-center px-12 py-6 max-w-full mx-auto">
      <a href="index.html" class="text-2xl font-serif italic text-blue-100 tracking-tight">Cinémathèque</a>
      <div class="hidden md:flex items-center space-x-10">
        <a class="text-slate-400 hover:text-white transition-colors duration-500 font-serif tracking-tight"
          href="index.html">Accueil</a>
        <a class="text-slate-400 hover:text-white transition-colors duration-500 font-serif tracking-tight"
          href="movies.html">Cinéma</a>
        <a class="text-slate-400 hover:text-white transition-colors duration-500 font-serif tracking-tight"
          href="series.html">Séries</a>
        <a class="text-slate-400 hover:text-white transition-colors duration-500 font-serif tracking-tight"
          href="documentaries.html">Documentaires</a>
        <a class="text-slate-400 hover:text-white transition-colors duration-500 font-serif tracking-tight"
          href="chatbot.html">Assistant</a>
        <a class="text-slate-400 hover:text-white transition-colors duration-500 font-serif tracking-tight"
          href="theaters.html">Salles</a>
      </div>
      <div class="flex items-center space-x-6">
        <div class="relative group hidden lg:block">
          <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">search</span>
          <input
            class="bg-surface-container-high/40 border-none border-b border-outline-variant/20 focus:border-primary focus:ring-0 text-sm py-2 pl-10 pr-4 w-64 transition-all duration-500"
            placeholder="Rechercher..." type="text" />
        </div>
        <button class="text-blue-200 hover:text-red-300 transition-all duration-500">
          <span class="material-symbols-outlined" data-icon="language">language</span>
        </button>
      </div>
    </div>
  </nav>

  <main class="pt-32 pb-20 px-6 md:px-12 max-w-4xl mx-auto">
    <p id="detail-error" class="text-red-300 hidden bg-surface-container-low p-8 border-l-2 border-primary">Fiche introuvable.</p>
    <article id="detail-root" class="hidden pt-8">
      <p id="detail-kind" class="text-xs uppercase tracking-[0.25em] text-secondary mb-4"></p>
      <h1 id="detail-title" class="text-4xl md:text-5xl font-serif mb-4 tracking-tight"></h1>
      <p id="detail-meta" class="text-on-surface-variant mb-8 text-lg font-light"></p>
      <div id="detail-poster-wrap" class="mb-10 shadow-2xl">
        <img id="detail-poster" class="w-full max-h-[480px] object-cover bg-surface-container" alt="" />
      </div>
      <div class="prose prose-invert max-w-none">
        <h2 class="text-sm uppercase tracking-widest text-secondary mb-3">Synopsis</h2>
        <p id="detail-desc" class="text-on-surface-variant leading-relaxed text-lg"></p>
      </div>
      <div class="mt-12 flex flex-wrap gap-4">
        <a id="detail-trailer" href="#" target="_blank" rel="noopener noreferrer" class="hidden"
          data-visible-class="inline-flex flex-col gap-1 rounded-lg bg-gradient-to-br from-primary to-[#8fa8d8] px-8 py-4 text-sm font-bold uppercase tracking-widest text-on-primary shadow-lg shadow-primary/20 ring-1 ring-white/10 transition hover:brightness-110 sm:flex-row sm:items-center sm:gap-4">
          <span class="inline-flex items-center gap-2">
            <span class="material-symbols-outlined text-2xl" style="font-variation-settings: 'FILL' 1;">play_circle</span>
            <span>Bande-annonce</span>
          </span>
          <span class="text-[10px] font-semibold normal-case tracking-[0.2em] text-on-primary/90 sm:border-l sm:border-on-primary/40 sm:pl-4">Voir</span>
        </a>
        <a id="detail-back" href="movies.html" class="inline-flex items-center gap-2 border border-outline-variant px-8 py-3 text-xs uppercase tracking-[0.2em] text-on-surface hover:border-primary transition-colors">
          Retour
        </a>
      </div>
    </article>
  </main>

  <!-- Footer -->
  <footer class="w-full border-t border-slate-800/50 bg-slate-950">
    <div class="flex flex-col md:flex-row justify-between items-center px-12 py-10 w-full">
      <a href="index.html" class="text-lg font-serif text-white mb-6 md:mb-0">Cinémathèque</a>
      <div class="flex space-x-8 mb-6 md:mb-0">
        <a class="font-sans uppercase tracking-[0.2em] text-[10px] text-slate-500 hover:text-red-400 transition-colors duration-300"
          href="terms.html">Conditions d'utilisation</a>
        <a class="font-sans uppercase tracking-[0.2em] text-[10px] text-slate-500 hover:text-red-400 transition-colors duration-300"
          href="privacy.html">Confidentialité</a>
        <a class="font-sans uppercase tracking-[0.2em] text-[10px] text-slate-500 hover:text-red-400 transition-colors duration-300"
          href="mailto:parthbhardwaj3045@gmail.com">Contact</a>
      </div>
      <div class="text-slate-500 font-sans uppercase tracking-[0.2em] text-[10px]">
        © 2026 Digital Cinémathèque. Tous droits réservés.
      </div>
    </div>
    <!-- Subtle Tricolour Accent Bar -->
    <div class="flex h-1 w-full">
      <div class="w-1/3 bg-blue-600"></div>
      <div class="w-1/3 bg-white"></div>
      <div class="w-1/3 bg-red-600"></div>
    </div>
  </footer>

  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var type = (params.get("type") || "movie").toLowerCase();
      var title = params.get("title");
      if (!title) {
        document.getElementById("detail-error").classList.remove("hidden");
        return;
      }
      var decoded = title;

      var path =
        type === "series"
          ? "assets/data/series.json"
          : type === "documentary"
            ? "assets/data/documentaries.json"
            : "assets/data/movies.json";

      fetch(path)
        .then(function (r) {
          return r.json();
        })
        .then(function (rows) {
          var item = rows.find(function (row) {
            return row.title === decoded;
          });
          if (!item) {
            document.getElementById("detail-error").classList.remove("hidden");
            return;
          }
          document.getElementById("detail-kind").textContent =
            type === "series"
              ? "Série"
              : type === "documentary"
                ? "Documentaire"
                : "Film";
          document.getElementById("detail-title").textContent = item.title;
          var metaParts = [];
          if (item.year) metaParts.push(item.year);
          if (item.director) metaParts.push(item.director);
          if (item.genre) metaParts.push(item.genre);
          if (type === "series" && item.episodes)
            metaParts.push(item.episodes + " épisodes");
          document.getElementById("detail-meta").textContent = metaParts.join(" · ");
          document.getElementById("detail-poster").src = item.image;
          document.getElementById("detail-poster").alt = item.title;
          document.getElementById("detail-desc").textContent =
            item.description ||
            "Aucune description pour le moment.";
          var tr = document.getElementById("detail-trailer");
          var vis = tr.getAttribute("data-visible-class") || "";
          if (item.trailerUrl && item.trailerUrl !== "#") {
            tr.href = item.trailerUrl;
            tr.className = vis;
          } else {
            tr.className = "hidden";
          }
          var back = document.getElementById("detail-back");
          if (type === "series") back.href = "series.html";
          else if (type === "documentary") back.href = "documentaries.html";
          else back.href = "movies.html";
          document.getElementById("detail-root").classList.remove("hidden");
        })
        .catch(function () {
          document.getElementById("detail-error").classList.remove("hidden");
        });
    })();
  </script>
</body>
</html>
