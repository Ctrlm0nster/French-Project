<!DOCTYPE html>

<head>

  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <script src="assets/js/config.local.js"></script>
  <script src="assets/js/supabase-client.js"></script>
  <script src="assets/js/site-common.js"></script>
  <link rel="stylesheet" href="assets/css/cursor.css" />
  <link rel="stylesheet" href="assets/css/main.css" />
  <script src="assets/js/cursor.js"></script>

  <script defer src="/_vercel/speed-insights/script.js"></script>
  <script id="tailwind-config">
    tailwind.config = {
        darkMode: "class",
        theme: {
            extend: {
                colors: { primary: "#c084fc", "on-primary": "#ffffff", "primary-container": "#4c1d95", "on-primary-container": "#e9d5ff", secondary: "#f472b6", "on-secondary": "#ffffff", background: "#080a0f", "on-background": "#f1f5f9", surface: "#12141c", "on-surface": "#f1f5f9", "surface-variant": "#1e2028", "on-surface-variant": "#94a3b8", "outline-variant": "rgba(255,255,255,0.08)" },
                fontFamily: { sans: ['"Space Grotesk"', "sans-serif"], serif: ['"Syne"', "sans-serif"] }
            }
        }
    }
  </script>
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col">
  <div class="bg-orbs" aria-hidden="true"></div>

  <!-- TopNavBar -->
  <nav class="nav-modern" id="main-nav">
    <a href="index.html" class="nav-logo">Cinémathèque</a>
    <ul class="nav-links hidden md:flex">
      <li><a href="index.html">Accueil</a></li>
      <li><a href="movies.html">Cinéma</a></li>
      <li><a href="series.html">Séries</a></li>
      <li><a href="documentaries.html">Docs</a></li>
      <li><a href="chatbot.html">Assistant</a></li>
      <li><a href="theaters.html">Salles</a></li>
    </ul>
    <div class="nav-actions flex items-center gap-4">
      <form action="search.html" method="get" class="relative hidden sm:block">
        <input
          id="search-input"
          name="q"
          class="bg-surface-container bg-opacity-50 border border-outline-variant focus:border-primary focus:ring-0 text-sm py-1.5 pl-10 pr-4 w-48 md:w-64 rounded-full transition-all duration-300 text-white placeholder:text-on-surface-variant focus:bg-surface-container-high"
          placeholder="Rechercher..." type="text" />
        <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant" style="font-size: 18px;">search</span>
      </form>
      <button class="btn btn-glass btn-icon">
        <span class="material-symbols-outlined" style="font-size:18px" data-icon="language">language</span>
      </button>
    </div>
  </nav>

  <main class="flex-grow pt-32 pb-24 px-6 md:px-12 w-full max-w-[1400px] mx-auto z-10 relative">
      <div id="search-root"></div>
  </main>

  <footer class="footer-modern">
    <div style="max-width:1280px;margin:0 auto;display:flex;flex-wrap:wrap;justify-content:space-between;align-items:center;gap:1.5rem">
        <a href="index.html" class="footer-logo">Cinémathèque</a>
        <div style="display:flex;gap:2rem">
            <a class="footer-link" href="terms.html">Conditions</a>
            <a class="footer-link" href="privacy.html">Confidentialité</a>
            <a class="footer-link" href="mailto:parthbhardwaj3045@gmail.com">Contact</a>
        </div>
        <div style="font-size:0.7rem;letter-spacing:0.08em;color:var(--text-muted)">© 2026 Digital Cinémathèque<br>Créé par Parth Sachin Bhardwaj</div>
    </div>
    <div class="footer-bar"></div>
  </footer>

  <script type="text/babel">
    const { useState, useEffect } = React;

    function SearchCard({ item, sectionType }) {
        const link = SiteCommon.detailHref(sectionType, item.title);
        
        return (
            <a href={link} className="group relative block overflow-hidden rounded-2xl bg-surface-variant shadow-lg hover:-translate-y-2 hover:shadow-2xl hover:shadow-primary/20 transition-all duration-300 border border-white/5 hover:border-primary/50 flex flex-col h-full">
                <div className="relative aspect-[2/3] w-full bg-surface-container overflow-hidden">
                    {item.image ? (
                        <img src={item.image} alt={item.title} className="h-full w-full object-cover transition-transform duration-700 group-hover:scale-110" />
                    ) : (
                        <div className="flex h-full items-center justify-center text-on-surface-variant">Image non disponible</div>
                    )}
                    <div className="absolute inset-0 bg-gradient-to-t from-background/90 via-background/20 to-transparent opacity-60 transition-opacity group-hover:opacity-80"></div>
                    
                    <span className="absolute top-4 left-4 bg-primary text-on-primary text-[10px] font-bold uppercase tracking-widest px-3 py-1 rounded shadow-lg backdrop-blur-md">
                        {sectionType === 'movie' ? 'Film' : sectionType === 'series' ? 'Série' : 'Documentaire'}
                    </span>
                </div>
                
                <div className="p-5 flex-grow flex flex-col justify-between z-10 bg-surface-variant/95 backdrop-blur-sm -mt-2">
                    <div>
                        <h3 className="font-serif text-lg md:text-xl text-white group-hover:text-primary transition-colors leading-tight">{item.title}</h3>
                        <p className="mt-2 text-xs text-on-surface-variant tracking-wider uppercase">{(item.director || item.genre || item.creator || item.director_name || "").toString()}</p>
                    </div>
                </div>
            </a>
        );
    }

    function SearchApp() {
        const [query, setQuery] = useState('');
        const [movies, setMovies] = useState([]);
        const [series, setSeries] = useState([]);
        const [docs, setDocs] = useState([]);
        const [loading, setLoading] = useState(true);

        useEffect(() => {
            const params = new URLSearchParams(window.location.search);
            const q = params.get('q') || '';
            setQuery(q);

            const searchInput = document.getElementById('search-input');
            if (searchInput) searchInput.value = q;

            if (!q.trim()) {
                setLoading(false);
                return;
            }
            const fetchData = async () => {
                if (typeof SupabaseClient !== 'undefined' && SupabaseClient.isConfigured && SupabaseClient.isConfigured()) {
                    try {
                        const [m, s, d] = await Promise.all([
                            SupabaseClient.fetchMovies(),
                            SupabaseClient.fetchSeries(),
                            SupabaseClient.fetchDocumentaries()
                        ]);
                        setMovies(m || []);
                        setSeries(s || []);
                        setDocs(d || []);
                    } catch (e) {
                        console.error('Failed to fetch data from Supabase:', e);
                    } finally {
                        setLoading(false);
                    }
                } else {
                    try {
                        const [mRes, sRes, dRes] = await Promise.all([
                            fetch('assets/data/movies.json'),
                            fetch('assets/data/series.json'),
                            fetch('assets/data/documentaries.json')
                        ]);
                        setMovies(await mRes.json());
                        setSeries(await sRes.json());
                        setDocs(await dRes.json());
                    } catch (e) {
                        console.error(e);
                    } finally {
                        setLoading(false);
                    }
                }
            };
            fetchData();
        }, []);

        const match = (item) => {
            if (!item) return false;
            const searchStr = (item.title || "") + " " + (item.description || "") + " " + (item.director || "") + " " + (item.genre || "");
            return searchStr.toLowerCase().includes(query.toLowerCase());
        };
        
        const filteredMovies = movies.filter(match);
        const filteredSeries = series.filter(match);
        const filteredDocs = docs.filter(match);
        const totalResults = filteredMovies.length + filteredSeries.length + filteredDocs.length;

        if (loading) {
            return (
                <div className="py-24 text-center">
                    <div className="inline-block w-16 h-16 border-4 border-primary/20 border-t-primary rounded-full animate-spin mb-4"></div>
                    <p className="text-xl text-primary font-serif animate-pulse">Recherche en cours...</p>
                </div>
            );
        }

        return (
            <div>
                <header className="mb-16">
                    <h1 className="text-5xl md:text-7xl font-serif tracking-tight mb-4 text-white">
                        Résultats pour <span className="text-primary italic">"{query}"</span>
                    </h1>
                    {query.trim() && (
                        <p className="text-on-surface-variant text-xl font-light italic">
                            {totalResults} résultat{totalResults !== 1 ? 's' : ''} trouvé{totalResults !== 1 ? 's' : ''}
                        </p>
                    )}
                </header>

                {!query.trim() ? (
                    <div className="bg-surface/50 p-8 border-l-4 border-primary rounded text-on-surface-variant text-lg">
                        Veuillez entrer un terme de recherche dans la barre de navigation.
                    </div>
                ) : totalResults === 0 ? (
                    <div className="bg-surface/50 p-8 border-l-4 border-red-500 rounded text-on-surface-variant text-lg shadow-lg">
                        Aucun résultat ne correspond à votre recherche. Essayez d'autres mots-clés ou explorez nos catégories.
                    </div>
                ) : (
                    <div className="space-y-20">
                        {filteredMovies.length > 0 && (
                            <section>
                                <h2 className="text-2xl font-serif text-white mb-8 border-b border-white/10 pb-4 flex items-center gap-3">
                                    <span className="material-symbols-outlined text-primary">movie</span>
                                    Films ({filteredMovies.length})
                                </h2>
                                <div className="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-6">
                                    {filteredMovies.map((m, i) => <SearchCard key={i} item={m} sectionType="movie" />)}
                                </div>
                            </section>
                        )}

                        {filteredSeries.length > 0 && (
                            <section>
                                <h2 className="text-2xl font-serif text-white mb-8 border-b border-white/10 pb-4 flex items-center gap-3">
                                    <span className="material-symbols-outlined text-primary">tv</span>
                                    Séries ({filteredSeries.length})
                                </h2>
                                <div className="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-6">
                                    {filteredSeries.map((s, i) => <SearchCard key={i} item={s} sectionType="series" />)}
                                </div>
                            </section>
                        )}

                        {filteredDocs.length > 0 && (
                            <section>
                                <h2 className="text-2xl font-serif text-white mb-8 border-b border-white/10 pb-4 flex items-center gap-3">
                                    <span className="material-symbols-outlined text-primary">videocam</span>
                                    Documentaires ({filteredDocs.length})
                                </h2>
                                <div className="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-6">
                                    {filteredDocs.map((d, i) => <SearchCard key={i} item={d} sectionType="documentary" />)}
                                </div>
                            </section>
                        )}
                    </div>
                )}
            </div>
        );
    }

    const root = ReactDOM.createRoot(document.getElementById('search-root'));
    root.render(<SearchApp />);
  </script>
</body>
</html>
