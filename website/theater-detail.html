    <script type="text/babel">
        const { useEffect, useState, useRef } = React;
        const GOOGLE_MAPS_PLACEHOLDER = "VOTRE_GOOGLE_MAPS_API_KEY";

        function waitForCondition(check, timeoutMs, errorMessage) {
            return new Promise((resolve, reject) => {
                const startedAt = Date.now();

                function tick() {
                    if (check()) {
                        resolve();
                        return;
                    }

                    if (Date.now() - startedAt >= timeoutMs) {
                        reject(new Error(errorMessage));
                        return;
                    }

                    setTimeout(tick, 100);
                }

                tick();
            });
        }

        function getGoogleMapsApiKey() {
            return String(
                (window.APP_CONFIG && window.APP_CONFIG.GOOGLE_MAPS_API_KEY) ||
                window.GOOGLE_MAPS_API_KEY ||
                ""
            ).trim();
        }

        function waitForGoogleMapsReady() {
            return waitForCondition(
                () => Boolean(
                    window.google &&
                    window.google.maps &&
                    window.google.maps.Map &&
                    window.google.maps.marker &&
                    window.google.maps.marker.AdvancedMarkerElement
                ),
                12000,
                "La bibliotheque Google Maps n'a pas termine son chargement"
            );
        }

        function loadGoogleMapsApi() {
            if (window.google && window.google.maps && window.google.maps.marker && window.google.maps.marker.AdvancedMarkerElement) {
                return Promise.resolve();
            }

            if (window.__cinemathequeGoogleMapsPromise) {
                return window.__cinemathequeGoogleMapsPromise;
            }

            window.__cinemathequeGoogleMapsPromise = (async () => {
                await waitForCondition(() => {
                    const key = getGoogleMapsApiKey();
                    return key && key !== GOOGLE_MAPS_PLACEHOLDER;
                }, 3000, "La cle publique GOOGLE_MAPS_API_KEY est absente de assets/js/config.js");

                const apiKey = getGoogleMapsApiKey();
                const existingScript = document.querySelector('script[data-google-maps-loader="true"]');

                if (!existingScript) {
                    await new Promise((resolve, reject) => {
                        const script = document.createElement("script");
                        script.src = `https://maps.googleapis.com/maps/api/js?key=${encodeURIComponent(apiKey)}&loading=async&libraries=marker`;
                        script.async = true;
                        script.defer = true;
                        script.dataset.googleMapsLoader = "true";
                        script.onload = () => resolve();
                        script.onerror = () => reject(new Error("Le chargement de Google Maps a echoue"));
                        document.head.appendChild(script);
                    });
                }

                await waitForGoogleMapsReady();
            })().catch((error) => {
                window.__cinemathequeGoogleMapsPromise = null;
                throw error;
            });

            return window.__cinemathequeGoogleMapsPromise;
        }

        function TheaterDetailMap({ venue }) {
            const mapNodeRef = useRef(null);
            const mapRef = useRef(null);
            const [is3D, setIs3D] = useState(false);
            const [mapError, setMapError] = useState("");

            useEffect(() => {
                let cancelled = false;

                loadGoogleMapsApi()
                    .then(() => {
                        if (cancelled) return;
                        const lat = venue.location?.coordinates?.latitude || venue.lat || 0;
                        const lng = venue.location?.coordinates?.longitude || venue.lng || 0;

                        if (!mapRef.current && mapNodeRef.current) {
                            mapRef.current = new window.google.maps.Map(mapNodeRef.current, {
                                center: { lat, lng },
                                zoom: 15,
                                mapId: "DEMO_MAP_ID",
                                styles: [
                                    { elementType: "geometry", stylers: [{ color: "#242f3e" }] },
                                    { elementType: "labels.text.stroke", stylers: [{ color: "#242f3e" }] },
                                    { elementType: "labels.text.fill", stylers: [{ color: "#746855" }] },
                                    { featureType: "water", elementType: "geometry", stylers: [{ color: "#17263c" }] }
                                ]
                            });
                            
                            new window.google.maps.marker.AdvancedMarkerElement({
                                position: { lat, lng },
                                map: mapRef.current,
                                title: venue.name
                            });
                        }
                        setMapError("");
                    })
                    .catch((error) => {
                        if (cancelled) return;
                        console.error("[Maps] Failed to load Google Maps:", error);
                        setMapError("La carte Google Maps n'est pas disponible. Vérifiez APP_CONFIG.GOOGLE_MAPS_API_KEY dans assets/js/config.js.");
                    });

                return () => {
                    cancelled = true;
                };
            }, [venue]);

            const toggle3D = () => {
                if (!mapRef.current) return;
                const map = mapRef.current;
                const panorama = map.getStreetView();
                const next3D = !is3D;
                
                if (next3D) {
                    const lat = venue.location?.coordinates?.latitude || venue.lat || 0;
                    const lng = venue.location?.coordinates?.longitude || venue.lng || 0;
                    panorama.setPosition({ lat, lng });
                    panorama.setPov({
                        heading: venue.street_view_3d?.heading_deg || venue.location?.street_view_3d?.heading_deg || 0,
                        pitch: venue.street_view_3d?.pitch_deg || venue.location?.street_view_3d?.pitch_deg || 0,
                    });
                    panorama.setVisible(true);
                } else {
                    panorama.setVisible(false);
                }
                setIs3D(next3D);
            };

            if (mapError) {
                return <div className="map-container flex items-center justify-center px-6 text-center text-on-surface-variant bg-surface-variant">{mapError}</div>;
            }

            return (
                <div style={{ position: 'relative' }}>
                    <div ref={mapNodeRef} className="map-container"></div>
                    <button 
                        onClick={toggle3D}
                        className="absolute bottom-4 right-4 bg-slate-900 border border-outline-variant hover:border-primary px-4 py-2 text-xs font-bold uppercase tracking-widest flex items-center gap-2 rounded transition-all"
                    >
                        <span className="material-symbols-outlined text-[16px]">{is3D ? "map" : "3d_rotation"}</span>
                        {is3D ? "Revenir à la carte" : "Vue 3D"}
                    </button>
                </div>
            );
        }

        function TheaterDetailApp() {
            const [venue, setVenue] = useState(null);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(false);

            useEffect(() => {
                const urlParams = new URLSearchParams(window.location.search);
                const queryId = urlParams.get('id');

                fetch("assets/data/theaters.json")
                    .then(res => res.json())
                    .then(data => {
                        const arr = Array.isArray(data) ? data : (data.sites || []);
                        const found = arr.find(v => v.id === queryId || v.name === queryId);
                        if (found) setVenue(found);
                        else setError(true);
                        setLoading(false);
                    })
                    .catch(() => {
                        setError(true);
                        setLoading(false);
                    });
            }, []);

            if (loading) return <div className="text-center py-20 animate-pulse text-primary">Chargement des détails...</div>;
            if (error || !venue) return (
                <div className="text-center py-20">
                    <h1 className="text-3xl font-serif text-red-400 mb-4">Lieu introuvable</h1>
                    <a href="theaters.html" className="text-primary hover:underline">← Retour à l'explorateur</a>
                </div>
            );

            const city = venue.location?.address?.city || venue.city || 'Inconnu';
            const vType = venue.identity?.type || venue.type || 'Cinéma';
            const note = venue.label || venue.note || '';

            return (
                <div className="space-y-12">
                    <a href="theaters.html" className="inline-flex items-center text-sm text-on-surface-variant hover:text-primary transition-colors">
                        <span className="material-symbols-outlined mr-1" style={{fontSize: '18px'}}>arrow_back</span>
                        Retour aux salles
                    </a>

                    <header>
                        <div className="flex items-center gap-3 mb-2">
                            <span className="text-[10px] uppercase font-bold tracking-[0.2em] text-primary-container bg-primary px-2 py-1 rounded">{city}</span>
                            <span className="text-[10px] uppercase font-bold tracking-[0.2em] text-on-surface-variant">{vType}</span>
                        </div>
                        <h1 className="text-5xl md:text-7xl font-serif tracking-tight text-white mb-4">{venue.name}</h1>
                        <p className="text-xl text-on-surface-variant font-light italic max-w-2xl">{note}</p>
                    </header>

                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                        <div className="lg:col-span-2 space-y-8">
                            <div className="detail-card">
                                <h2 className="text-xl font-bold font-serif mb-4 flex items-center gap-2"><span className="material-symbols-outlined text-primary">location_on</span> Situation</h2>
                                <TheaterDetailMap venue={venue} />
                                {venue.location?.address && (
                                    <p className="mt-4 text-on-surface-variant text-sm">
                                        {venue.location.address.street}, {venue.location.address.postal_code} {venue.location.address.city}
                                    </p>
                                )}
                            </div>

                            {venue.history && (
                                <div className="detail-card">
                                    <h2 className="text-xl font-bold font-serif mb-6 flex items-center gap-2"><span className="material-symbols-outlined text-primary">history_edu</span> Histoire & Héritage</h2>
                                    {venue.history.founder && (
                                        <p className="text-sm mb-4">Fondé par : <strong className="text-white">{typeof venue.history.founder === 'object' ? venue.history.founder.name : venue.history.founder}</strong></p>
                                    )}
                                    <div className="relative border-l border-primary/20 pl-6 space-y-4 py-2">
                                        {(venue.history.key_dates || venue.history.key_milestones || []).map((ms, i) => (
                                            <div key={i} className="relative">
                                                <div className="absolute -left-[29px] top-1 w-2 h-2 rounded-full bg-primary ring-4 ring-background"></div>
                                                <div className="text-primary font-bold text-sm">{ms.year}</div>
                                                <div className="text-on-surface-variant text-sm mt-1">{ms.event}</div>
                                            </div>
                                        ))}
                                    </div>
                                    {venue.history.notable_connections && (
                                        <div className="mt-6 pt-4 border-t border-white/5">
                                            <p className="text-xs uppercase tracking-widest text-on-surface-variant mb-2">Visiteurs notables</p>
                                            <div className="flex flex-wrap gap-2">
                                                {venue.history.notable_connections.map((c, i) => (
                                                    <span key={i} className="bg-white/5 px-3 py-1 rounded text-sm text-white">{c}</span>
                                                ))}
                                            </div>
                                        </div>
                                    )}
                                </div>
                            )}
                        </div>

                        <div className="space-y-8">
                            {(venue.contact || venue.opening_hours) && (
                                <div className="detail-card">
                                    <h2 className="text-xl font-bold font-serif mb-4 flex items-center gap-2"><span className="material-symbols-outlined text-primary">info</span> Informations pratiques</h2>
                                    {venue.contact && (
                                        <ul className="space-y-3 text-sm mb-6">
                                            {venue.contact.phone && <li><span className="text-on-surface-variant">Téléphone:</span> <a href={`tel:${venue.contact.phone}`} className="text-white hover:text-primary">{venue.contact.phone}</a></li>}
                                            {venue.contact.website && <li><span className="text-on-surface-variant">Site web:</span> <a href={venue.contact.website} target="_blank" className="text-white hover:text-primary break-words">{venue.contact.website}</a></li>}
                                        </ul>
                                    )}
                                    {venue.opening_hours && (
                                        <div>
                                            <p className="text-xs uppercase tracking-widest text-on-surface-variant mb-3">Horaires d'ouverture</p>
                                            <ul className="space-y-1 text-sm text-white">
                                                {Object.entries(venue.opening_hours).map(([day, hours]) => (
                                                    <li key={day} className="flex justify-between border-b border-white/5 py-1">
                                                        <span className="capitalize">{day}</span>
                                                        <span className="text-on-surface-variant font-mono">{hours}</span>
                                                    </li>
                                                ))}
                                            </ul>
                                        </div>
                                    )}
                                </div>
                            )}

                            {venue.programming && (
                                <div className="detail-card">
                                    <h2 className="text-xl font-bold font-serif mb-4 flex items-center gap-2"><span className="material-symbols-outlined text-primary">movie</span> Programmation</h2>
                                    <p className="text-sm italic text-on-surface-variant mb-4">{venue.programming.focus}</p>
                                    
                                    {venue.programming.special_events && (
                                        <ul className="space-y-2 text-sm text-white mt-4">
                                            {venue.programming.special_events.map((evt, i) => (
                                                <li key={i} className="flex items-start gap-2">
                                                    <span className="material-symbols-outlined text-primary text-[14px] mt-0.5">star</span>
                                                    {evt}
                                                </li>
                                            ))}
                                        </ul>
                                    )}
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById("react-root")).render(<TheaterDetailApp />);
    </script>
