<!DOCTYPE html>
<html lang="fr" class="dark">
<head>
  <meta charset="utf-8" />
  <title>Cinémathèque | Bienvenue</title>
  <link rel="apple-touch-icon" sizes="57x57" href="https://d3njjcbhbojbot.cloudfront.net/web/images/favicons/apple-touch-icon-v2-57x57.png" />
  <link rel="apple-touch-icon" sizes="60x60" href="https://d3njjcbhbojbot.cloudfront.net/web/images/favicons/apple-touch-icon-v2-60x60.png" />
  <link rel="apple-touch-icon" sizes="72x72" href="https://d3njjcbhbojbot.cloudfront.net/web/images/favicons/apple-touch-icon-v2-72x72.png" />
  <link rel="apple-touch-icon" sizes="76x76" href="https://d3njjcbhbojbot.cloudfront.net/web/images/favicons/apple-touch-icon-v2-76x76.png" />
  <link rel="apple-touch-icon" sizes="114x114" href="https://d3njjcbhbojbot.cloudfront.net/web/images/favicons/apple-touch-icon-v2-114x114.png" />
  <link rel="apple-touch-icon" sizes="120x120" href="https://d3njjcbhbojbot.cloudfront.net/web/images/favicons/apple-touch-icon-v2-120x120.png" />
  <link rel="apple-touch-icon" sizes="144x144" href="https://d3njjcbhbojbot.cloudfront.net/web/images/favicons/apple-touch-icon-v2-144x144.png" />
  <link rel="apple-touch-icon" sizes="152x152" href="https://d3njjcbhbojbot.cloudfront.net/web/images/favicons/apple-touch-icon-v2-152x152.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="https://d3njjcbhbojbot.cloudfront.net/web/images/favicons/apple-touch-icon-v2-180x180.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="refresh" content="2; url=website/index.html" />
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@1,300;1,700&family=Manrope:wght@300;500&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg: #0c0e10;
      --primary: #abc7fe;
      --secondary: #ffb3af;
      --text: #e2e2e5;
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: 'Manrope', sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      perspective: 1000px;
    }

    .brand-container {
      text-align: center;
      opacity: 0;
      transform: translateY(20px) translateZ(-100px);
      animation: entrance 1.5s cubic-bezier(0.2, 0, 0.2, 1) forwards;
    }

    @keyframes entrance {
      to {
        opacity: 1;
        transform: translateY(0) translateZ(0);
      }
    }

    .logo {
      font-family: 'Noto Serif', serif;
      font-style: italic;
      font-weight: 700;
      font-size: clamp(3rem, 10vw, 6rem);
      letter-spacing: -0.02em;
      color: white;
      margin-bottom: 0.5rem;
      background: linear-gradient(to bottom, #fff, #889);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .tagline {
      font-size: clamp(0.75rem, 2vw, 1rem);
      text-transform: uppercase;
      letter-spacing: 0.5em;
      color: var(--secondary);
      font-weight: 500;
      margin-left: 0.5em;
      animation: pulseTagline 2.2s ease-in-out infinite;
    }

    @keyframes pulseTagline {
      0%, 100% { opacity: 0.75; transform: translateY(0); }
      50% { opacity: 1; transform: translateY(-2px); }
    }

    .loader-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      height: 2px;
      width: 0;
      background: linear-gradient(90deg, transparent, var(--primary), transparent);
      animation: load 2.3s linear forwards;
    }

    @keyframes load {
      to { width: 100%; }
    }

    .manual-link {
      margin-top: 4rem;
      opacity: 0;
      animation: fadeIn 0.5s 1.5s forwards;
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    .btn {
      text-decoration: none;
      color: var(--text);
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.3em;
      padding: 1rem 2rem;
      border: 1px solid rgba(255,255,255,0.1);
      transition: all 0.3s;
    }

    .btn:hover {
      background: white;
      color: black;
      border-color: white;
    }

    .glow {
      position: absolute;
      width: 40vw;
      height: 40vw;
      background: radial-gradient(circle, var(--primary) 0%, transparent 70%);
      filter: blur(80px);
      opacity: 0.05;
      z-index: -1;
      animation: float 10s infinite alternate;
    }

    @keyframes float {
      from { transform: translate(-10%, -10%); }
      to { transform: translate(10%, 10%); }
    }

    .film-grain {
      pointer-events: none;
      position: absolute;
      inset: 0;
      opacity: 0.08;
      background-image: radial-gradient(circle, rgba(255,255,255,0.45) 0.5px, transparent 0.6px);
      background-size: 3px 3px;
      animation: grainShift 0.5s steps(2) infinite;
      mix-blend-mode: soft-light;
    }

    @keyframes grainShift {
      0% { transform: translate(0, 0); }
      100% { transform: translate(-2px, 2px); }
    }
  </style>
</head>
<body>
  <div class="glow"></div>
  <div class="film-grain"></div>
  <div class="brand-container">
    <h1 class="logo">Cinémathèque</h1>
    <p class="tagline">Le sanctuaire du septième art</p>
  </div>
  <div class="manual-link">
    <a href="website/index.html" class="btn">Entrer dans l'archive</a>
  </div>
  <div class="loader-bar"></div>
  <script>
    setTimeout(() => {
      window.location.href = "website/index.html";
    }, 2200);
  </script>
</body>
</html>
