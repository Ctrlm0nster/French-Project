  <style>
    .search-card {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--outline-variant);
      border-radius: 12px;
      backdrop-filter: blur(12px);
      transition: all 0.3s ease;
    }
    .search-card:hover {
      border-color: rgba(192, 132, 252, 0.4);
      background: rgba(255, 255, 255, 0.04);
      transform: translateY(-2px);
    }
  </style>

<body class="bg-background text-on-background min-h-screen flex flex-col">
  <div class="bg-orbs" aria-hidden="true"></div>

  <!-- TopNavBar -->
  <nav class="nav-modern" id="main-nav">
    <a href="index.html" class="nav-logo">Cinémathèque</a>
    <ul class="nav-links hidden md:flex">
      <li><a href="index.html">Accueil</a></li>
      <li><a href="movies.html">Cinéma</a></li>
      <li><a href="series.html">Séries</a></li>
      <li><a href="documentaries.html">Docs</a></li>
      <li><a href="chatbot.html">Assistant</a></li>
      <li><a href="theaters.html">Salles</a></li>
    </ul>
    <div class="nav-actions flex items-center gap-4">
            <form action="search.html" method="get" class="relative hidden sm:block">
                <input
                    id="search-input"
                    name="q"
                    class="bg-surface-container bg-opacity-50 border border-outline-variant focus:border-primary focus:ring-0 text-sm py-1.5 pl-10 pr-4 w-48 md:w-64 rounded-full transition-all duration-300 text-white placeholder:text-on-surface-variant focus:bg-surface-container-high"
                    placeholder="Rechercher..." type="text" />
                <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant" style="font-size: 18px;">search</span>
            </form>
            <button class="btn btn-glass btn-icon">
                <span class="material-symbols-outlined" style="font-size:18px" data-icon="language">language</span>
            </button>
        </div>
    </nav>

  <main class="flex-grow pt-32 pb-24 px-6 md:px-12 w-full max-w-[1200px] mx-auto z-10 relative">
    <header class="mb-12">
      <h1 class="text-5xl md:text-7xl font-serif tracking-tight mb-4 text-white">Résultats pour <span class="text-primary italic">Recherche</span></h1>
      <p id="search-query-label" class="text-on-surface-variant text-xl font-light italic"></p>
    </header>
    <div id="search-empty" class="text-on-surface-variant hidden bg-surface/50 p-8 border-l-2 border-primary rounded-r">
      Aucun résultat ne correspond à votre recherche. Essayez d'autres mots-clés ou explorez nos catégories.
    </div>
    <div id="search-sections" class="space-y-16 mt-8"></div>
  </main>

  <!-- Footer -->
  <footer class="footer-modern">
    <div style="max-width:1280px;margin:0 auto;display:flex;flex-wrap:wrap;justify-content:space-between;align-items:center;gap:1.5rem">
        <a href="index.html" class="footer-logo">Cinémathèque</a>
        <div style="display:flex;gap:2rem">
            <a class="footer-link" href="terms.html">Conditions</a>
            <a class="footer-link" href="privacy.html">Confidentialité</a>
            <a class="footer-link" href="mailto:parthbhardwaj3045@gmail.com">Contact</a>
        </div>
        <div style="font-size:0.7rem;letter-spacing:0.08em;color:var(--text-muted)">© 2026 Digital Cinémathèque</div>
    </div>
    <div class="footer-bar"></div>
  </footer>

  <script src="assets/js/cursor.js"></script>
  <script>
    window.addEventListener('scroll', function () {
        var n = document.getElementById('main-nav');
        if (n) n.classList.toggle('scrolled', window.scrollY > 30);
    });
    document.addEventListener("DOMContentLoaded", function () {
      if (window.SiteCommon) SiteCommon.initGoogleTranslate();
      var q = (new URLSearchParams(window.location.search).get("q") || "").trim();
      document.getElementById("search-input").value = q;
      document.getElementById("search-query-label").textContent = q
        ? "Pour : « " + q + " »"
        : "Entrez un terme depuis la page d’accueil.";

      if (!q) {
        document.getElementById("search-empty").classList.remove("hidden");
        return;
      }

      var needle = q.toLowerCase();

      function match(row) {
        var blob = JSON.stringify(row).toLowerCase();
        return blob.indexOf(needle) !== -1;
      }

      function card(row, type, label) {
        var href = SiteCommon.detailHref(
          type === "movie" ? "movie" : type === "series" ? "series" : "documentary",
          row.title
        );
        return (
          '<a href="' +
          href +
          '" class="search-card flex gap-6 p-4 items-center group">' +
          '<div style="width: 80px; height: 110px; border-radius: 8px; overflow: hidden; flex-shrink: 0;" class="bg-surface-container-high">' +
          '<img src="' + row.image + '" alt="" style="width:100%; height:100%; object-fit:cover;" class="group-hover:scale-105 transition-transform duration-500" />' +
          '</div>' +
          '<div class="flex-grow"><span class="text-[10px] uppercase font-bold tracking-[0.2em] bg-primary/20 text-primary px-2 py-1 rounded inline-block mb-2">' +
          label +
          "</span>" +
          '<h2 class="font-serif text-2xl text-white group-hover:text-primary transition-colors">' +
          row.title +
          "</h2>" +
          '<p class="text-sm text-on-surface-variant mt-2 max-h-10 overflow-hidden text-ellipsis">' +
          (row.director || row.genre || "") +
          "</p></div>" +
          '<div class="flex-shrink-0 pr-4 text-on-surface-variant group-hover:text-primary transition-colors"><span class="material-symbols-outlined">arrow_forward</span></div>' +
          '</a>'
        );
      }

      Promise.all([
        fetch("assets/data/movies.json").then(function (r) {
          return r.json();
        }),
        fetch("assets/data/series.json").then(function (r) {
          return r.json();
        }),
        fetch("assets/data/documentaries.json").then(function (r) {
          return r.json();
        }),
      ])
        .then(function (all) {
          var movies = all[0].filter(match);
          var series = all[1].filter(match);
          var docs = all[2].filter(match);
          var el = document.getElementById("search-sections");
          if (!movies.length && !series.length && !docs.length) {
            document.getElementById("search-empty").classList.remove("hidden");
            return;
          }
          function section(title, items, type, label) {
            if (!items.length) return "";
            var inner = items.map(function (row) {
              return card(row, type, label);
            }).join("");
            return (
              '<section><h2 class="text-xs uppercase font-bold tracking-[0.2em] text-on-surface-variant border-b border-outline-variant/30 pb-2 mb-6 flex items-center gap-2">- ' +
              title +
              "</h2>" +
              '<div class="grid md:grid-cols-2 gap-4">' +
              inner +
              "</div></section>"
            );
          }
          el.innerHTML =
            section("Films", movies, "movie", "Film") +
            section("Séries", series, "series", "Série") +
            section("Documentaires", docs, "documentary", "Documentaire");
        })
        .catch(function () {
          document.getElementById("search-empty").textContent =
            "Impossible de charger le catalogue.";
          document.getElementById("search-empty").classList.remove("hidden");
        });
    });
  </script>
</body>
</html>
