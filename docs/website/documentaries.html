  <main class="pt-28 pb-24 px-6 md:px-12" style="max-width:1600px;margin:0 auto">
    <header class="mb-14">

      <h1 class="section-title" style="font-size:clamp(2.5rem,7vw,5rem);margin-top:0.5rem">

      </h1>
      <p style="max-width:540px;margin-top:1rem;color:var(--text-secondary);font-size:0.92rem;line-height:1.75;font-style:italic">

      </p>
    </header>
    <div id="docs-react-root"></div>
  </main>

  <script type="text/babel">
    const { useEffect, useMemo, useState } = React;
    function DocumentariesExplorer() {
      const [docs, setDocs] = useState([]);
      const [isLoading, setIsLoading] = useState(true);
      const [year, setYear] = useState("Année");
      const [query, setQuery] = useState("");
      const [page, setPage] = useState(1);
      const itemsPerPage = 8;
      const years = useMemo(() => ["Année", ...new Set(docs.map((d) => d.year))].sort((a, b) => b - a), [docs]);

      useEffect(() => {
        fetch("assets/data/documentaries.json")
          .then((r) => r.json())
          .then((data) => {
            const arr = Array.isArray(data) ? data : [];
            setDocs(SiteCommon.shuffleArray(arr));
            setIsLoading(false);
          })
          .catch(() => {
            setDocs([]);
            setIsLoading(false);
          });
      }, []);

      const filtered = useMemo(() => docs.filter((d) => {
        const yearOk = year === "Année" || String(d.year) === String(year);
        const queryOk = !query || d.title.toLowerCase().includes(query.toLowerCase());
        return yearOk && queryOk;
      }), [docs, year, query]);
      const totalPages = Math.max(1, Math.ceil(filtered.length / itemsPerPage));
      const pagedItems = useMemo(() => {
        const start = (page - 1) * itemsPerPage;
        return filtered.slice(start, start + itemsPerPage);
      }, [filtered, page]);
      useEffect(() => { setPage(1); }, [year, query]);

      return (
        <div className="flex flex-col lg:flex-row gap-12">
          <aside className="w-full lg:w-64 flex-shrink-0 space-y-10">
            <div className="space-y-6">
              <h3 className="label-md uppercase tracking-[0.2em] text-secondary font-bold">Recherche</h3>
              <input value={query} onChange={(e) => setQuery(e.target.value)} placeholder="Titre..." className="w-full bg-surface-container-low border-none border-b border-outline-variant text-on-surface py-3 px-0 focus:ring-0 focus:border-primary" />
            </div>
            <div className="space-y-6">
              <h3 className="label-md uppercase tracking-[0.2em] text-secondary font-bold">Année</h3>
              <select value={year} onChange={(e) => setYear(e.target.value)} className="w-full bg-surface-container-low border-none border-b border-outline-variant text-on-surface py-3 px-0 focus:ring-0 focus:border-primary">
                {years.map((y) => <option key={y} value={y}>{y}</option>)}
              </select>
            </div>
          </aside>
          <div className="flex-grow">
            {isLoading ? <p className="text-on-surface-variant">Chargement des documentaires...</p> : null}
            <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-y-10 gap-x-6">
              {pagedItems.map((doc) => (
                <div key={doc.title} className="group mx-auto w-full max-w-[220px]">
                  <div className="relative aspect-[2/3] overflow-hidden bg-surface-container mb-4 hover-tilt">
                    <a href={SiteCommon.detailHref("documentary", doc.title)} className="block h-full">
                      <img className="w-full h-full object-cover grayscale group-hover:grayscale-0 group-hover:scale-105 transition-all duration-700" src={doc.image} alt={doc.title} />
                    </a>
                    <div className="absolute inset-0 bg-gradient-to-t from-background/80 via-transparent to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-500 flex items-end justify-between p-4 gap-2">
                      <a href={SiteCommon.detailHref("documentary", doc.title)} className="bg-primary text-on-primary px-4 py-2 text-[10px] uppercase tracking-wider font-bold text-center">Fiche</a>
                      {doc.trailerUrl ? (
                        <a href={doc.trailerUrl} target="_blank" rel="noopener noreferrer" className="inline-flex flex-col items-center gap-0.5 bg-surface-variant text-on-background px-3 py-2 text-[10px] uppercase tracking-wider font-bold border border-primary/40 hover:border-primary sm:flex-row sm:gap-2">
                          <span className="inline-flex items-center gap-1.5">
                            <span className="material-symbols-outlined text-base" style={{ fontVariationSettings: "'FILL' 1" }}>play_circle</span>
                            Bande-annonce
                          </span>
                          <span className="text-[9px] font-bold normal-case tracking-[0.15em] text-on-surface-variant">Voir</span>
                        </a>
                      ) : null}
                    </div>
                  </div>
                  <a href={SiteCommon.detailHref("documentary", doc.title)} className="block space-y-1 text-left">
                    <div className="flex justify-between items-baseline gap-2">
                      <h2 className="text-xl font-serif tracking-tight group-hover:text-primary transition-colors leading-tight">{doc.title}</h2>
                      <span className="label-md text-secondary shrink-0">{doc.year}</span>
                    </div>
                  </a>
                </div>
              ))}
            </div>
            <div className="mt-16 flex justify-center items-center space-x-4">
              <button disabled={page === 1} onClick={() => setPage((p) => Math.max(1, p - 1))} className="w-12 h-12 flex items-center justify-center border border-outline-variant hover:border-primary transition-colors disabled:opacity-40 disabled:hover:border-outline-variant magnetic">
                <span className="material-symbols-outlined">chevron_left</span>
              </button>
              <span className="label-md text-on-surface mx-4">PAGE {String(page).padStart(2, "0")} / {String(totalPages).padStart(2, "0")}</span>
              <button disabled={page === totalPages} onClick={() => setPage((p) => Math.min(totalPages, p + 1))} className="w-12 h-12 flex items-center justify-center border border-outline-variant hover:border-primary transition-colors disabled:opacity-40 disabled:hover:border-outline-variant magnetic">
                <span className="material-symbols-outlined">chevron_right</span>
              </button>
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById("docs-react-root")).render(<DocumentariesExplorer />);
  </script>
